# Rate limiting requires mod_ratelimit — optional, covered below
# ─────────────────────────────────────────
# HTTP → redirect to HTTPS
# ─────────────────────────────────────────
<VirtualHost *:80>
    ServerName nagar.fun
    ServerAlias *.nagar.fun

    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ─────────────────────────────────────────
# api.nagar.fun → Node.js app
# ─────────────────────────────────────────
<VirtualHost *:443>
    ServerName api.nagar.fun

    # Cloudflare Origin Certificate
    SSLEngine on
    SSLCertificateFile /etc/ssl/cloudflare/nagar.fun.pem
    SSLCertificateKeyFile /etc/ssl/cloudflare/nagar.fun.key

    # Strong SSL — TLS 1.2 and 1.3 only
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder off
    SSLSessionTickets off

    # Proxy to Node.js
    ProxyPreserveHost On
    ProxyPass /health http://localhost:3000/health
    ProxyPassReverse /health http://localhost:3000/health
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # Pass real client IP to your app
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always unset X-Powered-By
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/api.nagar.fun.error.log
    CustomLog ${APACHE_LOG_DIR}/api.nagar.fun.access.log combined

    # Silence health check logs — keeps logs clean
    SetEnvIf Request_URI "^/health$" health_check
    CustomLog ${APACHE_LOG_DIR}/api.nagar.fun.access.log combined env=!health_check
</VirtualHost>